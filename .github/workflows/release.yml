  #       id: version
  #       shell: bash
  #       run: |
  #         VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)"/\1/')
  #         echo "version=$VERSION" >> "$GITHUB_OUTPUT"
  #
  #     - name: Package ZIP
  #       shell: bash
  #       run: |
  #         7z a "Conch-${{ steps.version.outputs.version }}-windows-x86_64.zip" ./target/release/conch.exe
  #
  #     - uses: actions/upload-artifact@v4
  #       with:
  #         name: windows-zip
  #         path: "*.zip"

  # ---------------------------------------------------------------------------
  # Linux AMD64
  # ---------------------------------------------------------------------------
  build-linux-amd64:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: test
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libxcb-render0-dev libxcb-shape0-dev libxcb-xfixes0-dev \
            libxkbcommon-dev libwayland-dev libgtk-3-dev libssl-dev pkg-config

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Build
        run: cargo build --release -p conch_app

      - name: Extract version
        id: version
        run: |
          VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)"/\1/')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Build .deb
        run: |
          cargo install cargo-deb
          cargo deb -p conch_app --no-build

      - name: Build .rpm
        run: |
          cargo install cargo-generate-rpm
          cargo generate-rpm -p crates/conch_app

      - name: Rename artifacts
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          mkdir -p dist
          cp target/debian/*.deb "dist/conch_${VERSION}_amd64.deb"
          cp target/generate-rpm/*.rpm "dist/conch-${VERSION}-1.x86_64.rpm"

      - uses: actions/upload-artifact@v4
        with:
          name: linux-amd64-pkgs
          path: dist/*

  # ---------------------------------------------------------------------------
  # Linux ARM64 (cross-compiled)
  # ---------------------------------------------------------------------------
  build-linux-arm64:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: test
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-unknown-linux-gnu

      - name: Install cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Build with cross
        run: cross build --release -p conch_app --target aarch64-unknown-linux-gnu

      - name: Extract version
        id: version
        run: |
          VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)"/\1/')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Build .deb
        run: |
          cargo install cargo-deb
          cargo deb -p conch_app --no-build --no-strip \
            --target aarch64-unknown-linux-gnu \
            --variant=cross

      - name: Build .rpm
        run: |
          cargo install cargo-generate-rpm
          cargo generate-rpm -p crates/conch_app --target aarch64-unknown-linux-gnu

      - name: Rename artifacts
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          mkdir -p dist
          cp target/aarch64-unknown-linux-gnu/debian/*.deb "dist/conch_${VERSION}_arm64.deb"
          cp target/aarch64-unknown-linux-gnu/generate-rpm/*.rpm "dist/conch-${VERSION}-1.aarch64.rpm"

      - uses: actions/upload-artifact@v4
        with:
          name: linux-arm64-pkgs
          path: dist/*

  # ---------------------------------------------------------------------------
  # GitHub Release
  # ---------------------------------------------------------------------------
  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs:
      - build-macos-arm64
      - build-macos-x86
      - build-linux-amd64
      - build-linux-arm64
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Extract version
        id: version
        run: |
          VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)"/\1/')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: find artifacts -type f | sort

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Conch v${{ steps.version.outputs.version }}"
          generate_release_notes: true
          files: artifacts/*
