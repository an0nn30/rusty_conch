name: Release

on:
  push:
    tags: ["v[0-9]+.[0-9]+.[0-9]+*"]

env:
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  CARGO_TERM_COLOR: always

jobs:
  # ---------------------------------------------------------------------------
  # Changelog — generate release notes and create the GitHub Release
  # ---------------------------------------------------------------------------
  changelog:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate changelog
        id: changelog
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BODY=$(./.github/workflows/generate_changelog.sh)
          echo "$BODY" > /tmp/release_body.md
          cat /tmp/release_body.md

      - name: Create or update release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          if gh release view "$TAG" > /dev/null 2>&1; then
            gh release edit "$TAG" --draft --notes-file /tmp/release_body.md
          else
            gh release create "$TAG" --draft --title "$TAG" --notes-file /tmp/release_body.md
          fi

  # ---------------------------------------------------------------------------
  # macOS — universal binary (ARM64 + x86_64)
  # ---------------------------------------------------------------------------
  macos:
    needs: changelog
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install targets
        run: rustup update && rustup target add aarch64-apple-darwin x86_64-apple-darwin

      - uses: Swatinem/rust-cache@v2

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2"

      - name: Build Java SDK JAR (embedded in binary)
        run: make -C java-sdk build

      - name: Test
        run: cargo test --release

      - name: Build universal app with Tauri
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: cargo tauri build --target universal-apple-darwin

      - name: Extract version
        id: version
        run: |
          VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)"/\1/')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Upload DMG
        run: |
          ./.github/workflows/upload_asset.sh \
            ./target/universal-apple-darwin/release/bundle/dmg/*.dmg $GITHUB_TOKEN

      # NOTE: Exact artifact filenames (e.g., Conch.app.tar.gz) should be
      # verified after the first Tauri build — glob patterns used here as a
      # best-effort match.
      - name: Upload update artifact
        run: |
          ./.github/workflows/upload_asset.sh \
            ./target/universal-apple-darwin/release/bundle/macos/*.tar.gz $GITHUB_TOKEN
          ./.github/workflows/upload_asset.sh \
            ./target/universal-apple-darwin/release/bundle/macos/*.tar.gz.sig $GITHUB_TOKEN

  # ---------------------------------------------------------------------------
  # Windows — portable exe + MSI installer
  # ---------------------------------------------------------------------------
  windows:
    needs: changelog
    runs-on: windows-latest
    permissions:
      contents: write
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2"

      - name: Build Java SDK JAR (embedded in binary)
        run: |
          mkdir -p java-sdk/build/classes
          javac -d java-sdk/build/classes java-sdk/src/conch/plugin/*.java
          jar cf java-sdk/build/conch-plugin-sdk.jar -C java-sdk/build/classes .

      - name: Test
        run: cargo test --release

      - name: Build with Tauri
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: cargo tauri build

      - name: Extract version
        id: version
        run: |
          VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)"/\1/')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      # NOTE: Exact artifact filenames (e.g., Conch-v*-setup.exe.nsis.zip)
      # should be verified after the first Tauri build — glob patterns used
      # here as a best-effort match.
      - name: Upload NSIS installer
        run: |
          ./.github/workflows/upload_asset.sh \
            ./target/release/bundle/nsis/*.exe $GITHUB_TOKEN

      - name: Upload update artifact
        run: |
          ./.github/workflows/upload_asset.sh \
            ./target/release/bundle/nsis/*.nsis.zip $GITHUB_TOKEN
          ./.github/workflows/upload_asset.sh \
            ./target/release/bundle/nsis/*.nsis.zip.sig $GITHUB_TOKEN

  # ---------------------------------------------------------------------------
  # Generate latest.json — Tauri updater endpoint artifact
  # ---------------------------------------------------------------------------
  generate-latest-json:
    needs: [macos, windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version
        id: version
        run: |
          VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)"/\1/')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Download signatures from release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          gh release download "$TAG" --pattern "*.sig" --dir sigs/

      # NOTE: The artifact filenames in the URLs below (Conch.app.tar.gz,
      # Conch-v*-setup.exe.nsis.zip) should be verified after the first
      # successful Tauri build and updated if they differ.
      - name: Generate latest.json
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${{ steps.version.outputs.version }}"
          MAC_SIG=$(cat sigs/*.tar.gz.sig 2>/dev/null || echo "")
          WIN_SIG=$(cat sigs/*.nsis.zip.sig 2>/dev/null || echo "")

          cat > latest.json << ENDJSON
          {
            "version": "$VERSION",
            "notes": "See release notes at https://github.com/an0nn30/conch/releases/tag/$TAG",
            "pub_date": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "platforms": {
              "darwin-aarch64": {
                "signature": "$MAC_SIG",
                "url": "https://github.com/an0nn30/conch/releases/download/$TAG/Conch.app.tar.gz"
              },
              "darwin-x86_64": {
                "signature": "$MAC_SIG",
                "url": "https://github.com/an0nn30/conch/releases/download/$TAG/Conch.app.tar.gz"
              },
              "windows-x86_64": {
                "signature": "$WIN_SIG",
                "url": "https://github.com/an0nn30/conch/releases/download/$TAG/Conch-v${VERSION}-setup.exe.nsis.zip"
              }
            }
          }
          ENDJSON

      - name: Upload latest.json
        run: |
          ./.github/workflows/upload_asset.sh \
            ./latest.json $GITHUB_TOKEN

  # ---------------------------------------------------------------------------
  # Linux AMD64 — deb + rpm
  # ---------------------------------------------------------------------------
  linux-amd64:
    needs: changelog
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install system deps (Tauri/WebKit)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev libgtk-3-dev libssl-dev pkg-config \
            libayatana-appindicator3-dev librsvg2-dev

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Build Java SDK JAR (embedded in binary)
        run: make -C java-sdk build

      - name: Test
        run: cargo test --release

      - name: Build
        run: cargo build --release -p conch_tauri

      - name: Extract version
        id: version
        run: |
          VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)"/\1/')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Install packaging tools
        run: |
          cargo install cargo-deb
          cargo install cargo-generate-rpm

      - name: Build AMD64 .deb
        run: |
          cargo deb -p conch_tauri --no-build
          cp target/debian/*.deb ./conch-v${{ steps.version.outputs.version }}-amd64.deb

      - name: Build AMD64 .rpm
        run: |
          cargo generate-rpm -p crates/conch_tauri
          cp target/generate-rpm/*.rpm ./conch-v${{ steps.version.outputs.version }}-1.x86_64.rpm

      - name: Upload AMD64 packages
        run: |
          ./.github/workflows/upload_asset.sh \
            ./conch-v${{ steps.version.outputs.version }}-amd64.deb $GITHUB_TOKEN
          ./.github/workflows/upload_asset.sh \
            ./conch-v${{ steps.version.outputs.version }}-1.x86_64.rpm $GITHUB_TOKEN

  # ---------------------------------------------------------------------------
  # Linux ARM64 — deb + rpm (native build on ARM64 runner)
  # ---------------------------------------------------------------------------
  linux-arm64:
    needs: changelog
    runs-on: ubuntu-22.04-arm
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install system deps (Tauri/WebKit)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev libgtk-3-dev libssl-dev pkg-config \
            libayatana-appindicator3-dev librsvg2-dev

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Build Java SDK JAR (embedded in binary)
        run: make -C java-sdk build

      - name: Test
        run: cargo test --release

      - name: Build
        run: cargo build --release -p conch_tauri

      - name: Extract version
        id: version
        run: |
          VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)"/\1/')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Install packaging tools
        run: |
          cargo install cargo-deb
          cargo install cargo-generate-rpm

      - name: Build ARM64 .deb
        run: |
          cargo deb -p conch_tauri --no-build
          cp target/debian/*.deb ./conch-v${{ steps.version.outputs.version }}-arm64.deb

      - name: Build ARM64 .rpm
        run: |
          cargo generate-rpm -p crates/conch_tauri
          cp target/generate-rpm/*.rpm ./conch-v${{ steps.version.outputs.version }}-1.aarch64.rpm

      - name: Upload ARM64 packages
        run: |
          ./.github/workflows/upload_asset.sh \
            ./conch-v${{ steps.version.outputs.version }}-arm64.deb $GITHUB_TOKEN
          ./.github/workflows/upload_asset.sh \
            ./conch-v${{ steps.version.outputs.version }}-1.aarch64.rpm $GITHUB_TOKEN

  # ---------------------------------------------------------------------------
  # Extras — VS Code extension, Java SDK
  # ---------------------------------------------------------------------------
  extras:
    needs: changelog
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Extract version
        id: version
        run: |
          VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)"/\1/')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Build Java Plugin SDK
        run: make -C java-sdk build

      - name: Upload Java Plugin SDK
        run: |
          cp java-sdk/build/conch-plugin-sdk.jar \
            ./conch-plugin-sdk-v${{ steps.version.outputs.version }}.jar
          cp java-sdk/build/conch-plugin-sdk-sources.jar \
            ./conch-plugin-sdk-v${{ steps.version.outputs.version }}-sources.jar
          cp java-sdk/build/conch-plugin-sdk-javadoc.jar \
            ./conch-plugin-sdk-v${{ steps.version.outputs.version }}-javadoc.jar
          ./.github/workflows/upload_asset.sh \
            ./conch-plugin-sdk-v${{ steps.version.outputs.version }}.jar $GITHUB_TOKEN
          ./.github/workflows/upload_asset.sh \
            ./conch-plugin-sdk-v${{ steps.version.outputs.version }}-sources.jar $GITHUB_TOKEN
          ./.github/workflows/upload_asset.sh \
            ./conch-plugin-sdk-v${{ steps.version.outputs.version }}-javadoc.jar $GITHUB_TOKEN

      - name: Build VS Code extension
        working-directory: editors/vscode
        run: |
          npm install --silent
          npx tsc -p ./
          npx --yes @vscode/vsce package

      - name: Upload VS Code extension
        run: |
          ./.github/workflows/upload_asset.sh \
            ./editors/vscode/conch-lua-*.vsix $GITHUB_TOKEN

      - name: Upload example config
        run: |
          cp config.example.toml conch-config-example-v${{ steps.version.outputs.version }}.toml
          ./.github/workflows/upload_asset.sh \
            ./conch-config-example-v${{ steps.version.outputs.version }}.toml $GITHUB_TOKEN
