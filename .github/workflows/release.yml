name: Release

on:
  push:
    tags: ["v[0-9]+.[0-9]+.[0-9]+*"]

env:
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  CARGO_TERM_COLOR: always

jobs:
  # ---------------------------------------------------------------------------
  # Changelog — generate release notes and create the GitHub Release
  # ---------------------------------------------------------------------------
  changelog:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate changelog
        id: changelog
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BODY=$(./.github/workflows/generate_changelog.sh)
          echo "$BODY" > /tmp/release_body.md
          cat /tmp/release_body.md

      - name: Create or update release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          if gh release view "$TAG" > /dev/null 2>&1; then
            gh release edit "$TAG" --draft --notes-file /tmp/release_body.md
          else
            gh release create "$TAG" --draft --title "$TAG" --notes-file /tmp/release_body.md
          fi

  # ---------------------------------------------------------------------------
  # macOS — universal binary (ARM64 + x86_64)
  # ---------------------------------------------------------------------------
  macos:
    needs: changelog
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install targets
        run: rustup update && rustup target add aarch64-apple-darwin x86_64-apple-darwin

      - uses: Swatinem/rust-cache@v2

      - name: Build Java SDK JAR (embedded in binary)
        run: make -C java-sdk build

      - name: Test
        run: cargo test --release --target=x86_64-apple-darwin

      - name: Build ARM64
        run: cargo build --release -p conch_tauri --target=aarch64-apple-darwin

      - name: Build x86_64
        run: cargo build --release -p conch_tauri --target=x86_64-apple-darwin

      - name: Extract version
        id: version
        run: |
          VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)"/\1/')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Create universal .app bundle
        run: |
          APP="Conch.app"
          mkdir -p "$APP/Contents/MacOS" "$APP/Contents/Resources"

          lipo -create \
            target/aarch64-apple-darwin/release/conch \
            target/x86_64-apple-darwin/release/conch \
            -output "$APP/Contents/MacOS/conch"

          cp packaging/macos/Info.plist "$APP/Contents/"
          if [ -f crates/conch_tauri/icons/icon.icns ]; then
            cp crates/conch_tauri/icons/icon.icns "$APP/Contents/Resources/conch.icns"
          fi

          codesign --remove-signature "$APP" 2>/dev/null || true
          codesign --force --deep --sign - "$APP"

      - name: Install create-dmg
        run: brew install create-dmg

      - name: Create DMG
        run: |
          mkdir -p dmg-staging
          mv Conch.app dmg-staging/
          create-dmg \
            --volname "Conch" \
            --window-pos 200 120 \
            --window-size 600 400 \
            --icon-size 80 \
            --icon "Conch.app" 150 200 \
            --hide-extension "Conch.app" \
            --app-drop-link 450 200 \
            --no-internet-enable \
            "Conch-v${{ steps.version.outputs.version }}.dmg" \
            "dmg-staging/" || true
          rm -rf dmg-staging

      - name: Upload DMG
        run: |
          ./.github/workflows/upload_asset.sh \
            ./Conch-v${{ steps.version.outputs.version }}.dmg $GITHUB_TOKEN

  # ---------------------------------------------------------------------------
  # Windows — portable exe + MSI installer
  # ---------------------------------------------------------------------------
  windows:
    needs: changelog
    runs-on: windows-latest
    permissions:
      contents: write
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Build Java SDK JAR (embedded in binary)
        run: |
          mkdir -p java-sdk/build/classes
          javac -d java-sdk/build/classes java-sdk/src/conch/plugin/*.java
          jar cf java-sdk/build/conch-plugin-sdk.jar -C java-sdk/build/classes .

      - name: Test
        run: cargo test --release

      - name: Build
        run: cargo build --release -p conch_tauri

      - name: Extract version
        id: version
        run: |
          VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)"/\1/')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Upload portable executable
        run: |
          mkdir -p portable
          cp ./target/release/conch.exe portable/
          cd portable && 7z a -tzip "../Conch-v${{ steps.version.outputs.version }}-portable.zip" . && cd ..
          ./.github/workflows/upload_asset.sh \
            ./Conch-v${{ steps.version.outputs.version }}-portable.zip $GITHUB_TOKEN

      - name: Install WiX
        run: dotnet tool install --global wix --version 4.0.5

      - name: Build MSI installer
        run: |
          wix extension add WixToolset.UI.wixext/4.0.5 WixToolset.Util.wixext/4.0.5
          wix build -arch "x64" -ext WixToolset.UI.wixext -ext WixToolset.Util.wixext \
            -out "./Conch-v${{ steps.version.outputs.version }}-installer.msi" \
            "packaging/windows/conch.wxs"

      - name: Upload MSI installer
        run: |
          ./.github/workflows/upload_asset.sh \
            ./Conch-v${{ steps.version.outputs.version }}-installer.msi $GITHUB_TOKEN

  # ---------------------------------------------------------------------------
  # Linux AMD64 — deb + rpm
  # ---------------------------------------------------------------------------
  linux-amd64:
    needs: changelog
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install system deps (Tauri/WebKit)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev libgtk-3-dev libssl-dev pkg-config \
            libayatana-appindicator3-dev librsvg2-dev

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Build Java SDK JAR (embedded in binary)
        run: make -C java-sdk build

      - name: Test
        run: cargo test --release

      - name: Build
        run: cargo build --release -p conch_tauri

      - name: Extract version
        id: version
        run: |
          VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)"/\1/')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Install packaging tools
        run: |
          cargo install cargo-deb
          cargo install cargo-generate-rpm

      - name: Build AMD64 .deb
        run: |
          cargo deb -p conch_tauri --no-build
          cp target/debian/*.deb ./conch-v${{ steps.version.outputs.version }}-amd64.deb

      - name: Build AMD64 .rpm
        run: |
          cargo generate-rpm -p crates/conch_tauri
          cp target/generate-rpm/*.rpm ./conch-v${{ steps.version.outputs.version }}-1.x86_64.rpm

      - name: Upload AMD64 packages
        run: |
          ./.github/workflows/upload_asset.sh \
            ./conch-v${{ steps.version.outputs.version }}-amd64.deb $GITHUB_TOKEN
          ./.github/workflows/upload_asset.sh \
            ./conch-v${{ steps.version.outputs.version }}-1.x86_64.rpm $GITHUB_TOKEN

  # ---------------------------------------------------------------------------
  # Linux ARM64 — deb + rpm (native build on ARM64 runner)
  # ---------------------------------------------------------------------------
  linux-arm64:
    needs: changelog
    runs-on: ubuntu-22.04-arm
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install system deps (Tauri/WebKit)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev libgtk-3-dev libssl-dev pkg-config \
            libayatana-appindicator3-dev librsvg2-dev

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Build Java SDK JAR (embedded in binary)
        run: make -C java-sdk build

      - name: Test
        run: cargo test --release

      - name: Build
        run: cargo build --release -p conch_tauri

      - name: Extract version
        id: version
        run: |
          VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)"/\1/')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Install packaging tools
        run: |
          cargo install cargo-deb
          cargo install cargo-generate-rpm

      - name: Build ARM64 .deb
        run: |
          cargo deb -p conch_tauri --no-build
          cp target/debian/*.deb ./conch-v${{ steps.version.outputs.version }}-arm64.deb

      - name: Build ARM64 .rpm
        run: |
          cargo generate-rpm -p crates/conch_tauri
          cp target/generate-rpm/*.rpm ./conch-v${{ steps.version.outputs.version }}-1.aarch64.rpm

      - name: Upload ARM64 packages
        run: |
          ./.github/workflows/upload_asset.sh \
            ./conch-v${{ steps.version.outputs.version }}-arm64.deb $GITHUB_TOKEN
          ./.github/workflows/upload_asset.sh \
            ./conch-v${{ steps.version.outputs.version }}-1.aarch64.rpm $GITHUB_TOKEN

  # ---------------------------------------------------------------------------
  # Extras — VS Code extension, Java SDK
  # ---------------------------------------------------------------------------
  extras:
    needs: changelog
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Extract version
        id: version
        run: |
          VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)"/\1/')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Build Java Plugin SDK
        run: make -C java-sdk build

      - name: Upload Java Plugin SDK
        run: |
          cp java-sdk/build/conch-plugin-sdk.jar \
            ./conch-plugin-sdk-v${{ steps.version.outputs.version }}.jar
          cp java-sdk/build/conch-plugin-sdk-sources.jar \
            ./conch-plugin-sdk-v${{ steps.version.outputs.version }}-sources.jar
          cp java-sdk/build/conch-plugin-sdk-javadoc.jar \
            ./conch-plugin-sdk-v${{ steps.version.outputs.version }}-javadoc.jar
          ./.github/workflows/upload_asset.sh \
            ./conch-plugin-sdk-v${{ steps.version.outputs.version }}.jar $GITHUB_TOKEN
          ./.github/workflows/upload_asset.sh \
            ./conch-plugin-sdk-v${{ steps.version.outputs.version }}-sources.jar $GITHUB_TOKEN
          ./.github/workflows/upload_asset.sh \
            ./conch-plugin-sdk-v${{ steps.version.outputs.version }}-javadoc.jar $GITHUB_TOKEN

      - name: Build VS Code extension
        working-directory: editors/vscode
        run: |
          npm install --silent
          npx tsc -p ./
          npx --yes @vscode/vsce package

      - name: Upload VS Code extension
        run: |
          ./.github/workflows/upload_asset.sh \
            ./editors/vscode/conch-lua-*.vsix $GITHUB_TOKEN

      - name: Upload example config
        run: |
          cp config.example.toml conch-config-example-v${{ steps.version.outputs.version }}.toml
          ./.github/workflows/upload_asset.sh \
            ./conch-config-example-v${{ steps.version.outputs.version }}.toml $GITHUB_TOKEN
