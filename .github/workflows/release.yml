name: Build & Release

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  # ---------------------------------------------------------------------------
  # Test
  # ---------------------------------------------------------------------------
  test:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libxcb-render0-dev libxcb-shape0-dev libxcb-xfixes0-dev \
            libxkbcommon-dev libwayland-dev libgtk-3-dev libssl-dev pkg-config

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Run tests
        run: cargo test --workspace

  # ---------------------------------------------------------------------------
  # macOS ARM64
  # ---------------------------------------------------------------------------
  build-macos-arm64:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: test
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Build
        run: cargo build --release -p conch_app

      - name: Extract version
        id: version
        run: |
          VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)"/\1/')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Create .app bundle & DMG
        run: |
          APP="Conch.app"
          mkdir -p "$APP/Contents/MacOS" "$APP/Contents/Resources"
          cp target/release/conch "$APP/Contents/MacOS/"
          cp packaging/macos/Info.plist "$APP/Contents/"
          cp crates/conch_app/icons/conch.icns "$APP/Contents/Resources/"
          hdiutil create -volname "Conch" -srcfolder "$APP" -ov -format UDZO \
            "Conch-${{ steps.version.outputs.version }}-macos-arm64.dmg"

      - uses: actions/upload-artifact@v4
        with:
          name: macos-arm64-dmg
          path: "*.dmg"

  # ---------------------------------------------------------------------------
  # macOS x86_64 (cross-compiled on ARM64 runner)
  # ---------------------------------------------------------------------------
  build-macos-x86:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: test
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin
      - uses: Swatinem/rust-cache@v2

      - name: Build
        run: cargo build --release -p conch_app --target x86_64-apple-darwin

      - name: Extract version
        id: version
        run: |
          VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)"/\1/')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Create .app bundle & DMG
        run: |
          APP="Conch.app"
          mkdir -p "$APP/Contents/MacOS" "$APP/Contents/Resources"
          cp target/x86_64-apple-darwin/release/conch "$APP/Contents/MacOS/"
          cp packaging/macos/Info.plist "$APP/Contents/"
          cp crates/conch_app/icons/conch.icns "$APP/Contents/Resources/"
          hdiutil create -volname "Conch" -srcfolder "$APP" -ov -format UDZO \
            "Conch-${{ steps.version.outputs.version }}-macos-x86_64.dmg"

      - uses: actions/upload-artifact@v4
        with:
          name: macos-x86-dmg
          path: "*.dmg"

  # ---------------------------------------------------------------------------
  # Windows x86_64
  # Disabled: conch_session uses Unix-only APIs (UnixStream, Pty::child).
  # Re-enable once platform-specific code is gated with #[cfg].
