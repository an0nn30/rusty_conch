name: Release

on:
  push:
    tags: ["v[0-9]+.[0-9]+.[0-9]+*"]

env:
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  CARGO_TERM_COLOR: always

jobs:
  # ---------------------------------------------------------------------------
  # Changelog — generate release notes and create the GitHub Release
  # ---------------------------------------------------------------------------
  changelog:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate changelog
        id: changelog
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BODY=$(./.github/workflows/generate_changelog.sh)
          # Write to file to avoid escaping issues.
          echo "$BODY" > /tmp/release_body.md
          cat /tmp/release_body.md

      - name: Create or update release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          # Try to edit an existing release first (in case upload_asset.sh created a draft).
          if gh release view "$TAG" > /dev/null 2>&1; then
            gh release edit "$TAG" --draft --notes-file /tmp/release_body.md
          else
            gh release create "$TAG" --draft --title "$TAG" --notes-file /tmp/release_body.md
          fi

  # ---------------------------------------------------------------------------
  # macOS — universal binary (ARM64 + x86_64)
  # ---------------------------------------------------------------------------
  macos:
    needs: changelog
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install targets
        run: rustup update && rustup target add aarch64-apple-darwin x86_64-apple-darwin

      - uses: Swatinem/rust-cache@v2

      - name: Build Java SDK JAR (embedded in binary)
        run: make -C java-sdk build

      - name: Test
        run: cargo test --release --target=x86_64-apple-darwin

      - name: Build ARM64
        run: cargo build --release --target=aarch64-apple-darwin

      - name: Build x86_64
        run: cargo build --release --target=x86_64-apple-darwin

      - name: Extract version
        id: version
        run: |
          VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)"/\1/')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Create universal .app bundle & DMG
        run: |
          APP="Conch.app"
          mkdir -p "$APP/Contents/MacOS" "$APP/Contents/Resources" "$APP/Contents/Plugins"

          # Create universal binary
          lipo -create \
            target/aarch64-apple-darwin/release/conch \
            target/x86_64-apple-darwin/release/conch \
            -output "$APP/Contents/MacOS/conch"

          # Create universal plugin libraries
          for plugin in libconch_ssh.dylib libconch_files.dylib; do
            lipo -create \
              "target/aarch64-apple-darwin/release/$plugin" \
              "target/x86_64-apple-darwin/release/$plugin" \
              -output "$APP/Contents/Plugins/$plugin"
          done

          cp packaging/macos/Info.plist "$APP/Contents/"
          cp crates/conch_app/icons/conch.icns "$APP/Contents/Resources/"

          # Remove any existing signature, then ad-hoc sign
          codesign --remove-signature "$APP" 2>/dev/null || true
          codesign --force --deep --sign - "$APP"

          hdiutil create -volname "Conch" -srcfolder "$APP" \
            -fs HFS+ -ov -format UDZO \
            "Conch-v${{ steps.version.outputs.version }}.dmg"

      - name: Upload DMG
        run: |
          ./.github/workflows/upload_asset.sh \
            ./Conch-v${{ steps.version.outputs.version }}.dmg $GITHUB_TOKEN

  # ---------------------------------------------------------------------------
  # Windows — portable exe + MSI installer
  # ---------------------------------------------------------------------------
  windows:
    needs: changelog
    runs-on: windows-latest
    permissions:
      contents: write
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Build Java SDK JAR (embedded in binary)
        run: |
          mkdir -p java-sdk/build/classes
          javac -d java-sdk/build/classes java-sdk/src/conch/plugin/*.java
          jar cf java-sdk/build/conch-plugin-sdk.jar -C java-sdk/build/classes .

      - name: Test
        run: cargo test --release

      - name: Build
        run: cargo build --release

      - name: Extract version
        id: version
        run: |
          VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)"/\1/')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Upload portable executable
        run: |
          mkdir -p portable
          cp ./target/release/conch.exe portable/
          cp ./target/release/conch_ssh.dll portable/ 2>/dev/null || true
          cp ./target/release/conch_files.dll portable/ 2>/dev/null || true
          # Zip the portable directory (exe + plugin DLLs)
          cd portable && 7z a -tzip "../Conch-v${{ steps.version.outputs.version }}-portable.zip" . && cd ..
          ./.github/workflows/upload_asset.sh \
            ./Conch-v${{ steps.version.outputs.version }}-portable.zip $GITHUB_TOKEN

      - name: Install WiX
        run: dotnet tool install --global wix --version 4.0.5

      - name: Build MSI installer
        run: |
          wix extension add WixToolset.UI.wixext/4.0.5 WixToolset.Util.wixext/4.0.5
          wix build -arch "x64" -ext WixToolset.UI.wixext -ext WixToolset.Util.wixext \
            -out "./Conch-v${{ steps.version.outputs.version }}-installer.msi" \
            "packaging/windows/conch.wxs"

      - name: Upload MSI installer
        run: |
          ./.github/workflows/upload_asset.sh \
            ./Conch-v${{ steps.version.outputs.version }}-installer.msi $GITHUB_TOKEN

  # ---------------------------------------------------------------------------
  # Linux — deb + rpm for AMD64 and ARM64
  # ---------------------------------------------------------------------------
  linux:
    needs: changelog
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libxcb-render0-dev libxcb-shape0-dev libxcb-xfixes0-dev \
            libxkbcommon-dev libwayland-dev libgtk-3-dev libssl-dev pkg-config

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Build Java SDK JAR (embedded in binary)
        run: make -C java-sdk build

      - name: Test
        run: cargo test --release

      - name: Build
        run: cargo build --release

      - name: Extract version
        id: version
        run: |
          VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)"/\1/')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Install packaging tools
        run: |
          cargo install cargo-deb
          cargo install cargo-generate-rpm

      - name: Build AMD64 .deb
        run: |
          cargo deb -p conch_app --no-build
          cp target/debian/*.deb ./conch-v${{ steps.version.outputs.version }}-amd64.deb

      - name: Build AMD64 .rpm
        run: |
          cargo generate-rpm -p crates/conch_app
          cp target/generate-rpm/*.rpm ./conch-v${{ steps.version.outputs.version }}-1.x86_64.rpm

      - name: Upload AMD64 packages
        run: |
          ./.github/workflows/upload_asset.sh \
            ./conch-v${{ steps.version.outputs.version }}-amd64.deb $GITHUB_TOKEN
          ./.github/workflows/upload_asset.sh \
            ./conch-v${{ steps.version.outputs.version }}-1.x86_64.rpm $GITHUB_TOKEN

      - name: Install cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Clean host build artifacts before cross
        run: cargo clean

      - name: Build ARM64 with cross
        run: cross build --release --target aarch64-unknown-linux-gnu

      - name: Build ARM64 .deb
        run: |
          cargo deb -p conch_app --no-build --no-strip \
            --target aarch64-unknown-linux-gnu --variant=cross
          cp target/aarch64-unknown-linux-gnu/debian/*.deb \
            ./conch-v${{ steps.version.outputs.version }}-arm64.deb

      - name: Build ARM64 .rpm
        run: |
          cargo generate-rpm -p crates/conch_app --target aarch64-unknown-linux-gnu
          cp target/aarch64-unknown-linux-gnu/generate-rpm/*.rpm \
            ./conch-v${{ steps.version.outputs.version }}-1.aarch64.rpm

      - name: Upload ARM64 packages
        run: |
          ./.github/workflows/upload_asset.sh \
            ./conch-v${{ steps.version.outputs.version }}-arm64.deb $GITHUB_TOKEN
          ./.github/workflows/upload_asset.sh \
            ./conch-v${{ steps.version.outputs.version }}-1.aarch64.rpm $GITHUB_TOKEN

  # ---------------------------------------------------------------------------
  # Extras — VS Code extension, Java SDK, example config & plugins
  # ---------------------------------------------------------------------------
  extras:
    needs: changelog
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Extract version
        id: version
        run: |
          VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)"/\1/')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Build Java Plugin SDK
        run: make -C java-sdk build

      - name: Upload Java Plugin SDK
        run: |
          cp java-sdk/build/conch-plugin-sdk.jar \
            ./conch-plugin-sdk-v${{ steps.version.outputs.version }}.jar
          cp java-sdk/build/conch-plugin-sdk-sources.jar \
            ./conch-plugin-sdk-v${{ steps.version.outputs.version }}-sources.jar
          cp java-sdk/build/conch-plugin-sdk-javadoc.jar \
            ./conch-plugin-sdk-v${{ steps.version.outputs.version }}-javadoc.jar
          ./.github/workflows/upload_asset.sh \
            ./conch-plugin-sdk-v${{ steps.version.outputs.version }}.jar $GITHUB_TOKEN
          ./.github/workflows/upload_asset.sh \
            ./conch-plugin-sdk-v${{ steps.version.outputs.version }}-sources.jar $GITHUB_TOKEN
          ./.github/workflows/upload_asset.sh \
            ./conch-plugin-sdk-v${{ steps.version.outputs.version }}-javadoc.jar $GITHUB_TOKEN

      - name: Build VS Code extension
        working-directory: editors/vscode
        run: |
          npm install --silent
          npx tsc -p ./
          npx --yes @vscode/vsce package

      - name: Upload VS Code extension
        run: |
          ./.github/workflows/upload_asset.sh \
            ./editors/vscode/conch-lua-*.vsix $GITHUB_TOKEN

      - name: Package example config & plugins
        run: |
          mkdir -p conch-examples
          cp config.example.toml conch-examples/
          cp -r examples/plugins conch-examples/plugins
          tar czf conch-examples-v${{ steps.version.outputs.version }}.tar.gz conch-examples/

      - name: Upload examples archive
        run: |
          ./.github/workflows/upload_asset.sh \
            ./conch-examples-v${{ steps.version.outputs.version }}.tar.gz $GITHUB_TOKEN
