name: CI

on:
  push:
    branches: [main, v2]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  ubuntu:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libxcb-render0-dev libxcb-shape0-dev libxcb-xfixes0-dev \
            libxkbcommon-dev libwayland-dev libgtk-3-dev libssl-dev pkg-config

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2

      - name: Build Java SDK JAR (embedded in binary)
        run: make -C java-sdk build

      - name: Test
        run: cargo test --workspace

      - name: Clippy
        run: cargo clippy --all-targets

  macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Build Java SDK JAR (embedded in binary)
        run: make -C java-sdk build

      - name: Test
        run: cargo test --workspace

  windows:
    runs-on: windows-latest
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Build Java SDK JAR (embedded in binary)
        run: |
          mkdir -p java-sdk/build/classes
          javac -d java-sdk/build/classes java-sdk/src/conch/plugin/*.java
          jar cf java-sdk/build/conch-plugin-sdk.jar -C java-sdk/build/classes .

      - name: Test
        run: cargo test --workspace
