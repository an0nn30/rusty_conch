name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  lint:
    name: Lint & Audit
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Format check
        run: cargo fmt -- --check

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      - name: Audit dependencies
        run: cargo audit || true

  ubuntu:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install system deps (Tauri/WebKit)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev libgtk-3-dev libssl-dev pkg-config \
            libayatana-appindicator3-dev librsvg2-dev

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2

      - name: Build Java SDK JAR (embedded in binary)
        run: make -C java-sdk build

      - name: Test
        run: cargo test --workspace

      - name: Clippy
        run: cargo clippy --all-targets

  macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2

      - name: Build Java SDK JAR (embedded in binary)
        run: make -C java-sdk build

      - name: Test
        run: cargo test --workspace

      - name: Clippy
        run: cargo clippy --all-targets

  windows:
    runs-on: windows-latest
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2

      - name: Build Java SDK JAR (embedded in binary)
        run: |
          mkdir -p java-sdk/build/classes
          javac -d java-sdk/build/classes java-sdk/src/conch/plugin/*.java
          jar cf java-sdk/build/conch-plugin-sdk.jar -C java-sdk/build/classes .

      - name: Test
        run: cargo test --workspace

      - name: Clippy
        run: cargo clippy --all-targets
