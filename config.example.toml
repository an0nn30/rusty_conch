# Conch — Example Configuration
#
# All values shown are the defaults. Uncomment and modify as needed.
# Config location:
#   macOS / Linux: ~/.config/conch/config.toml
#   Windows:       %APPDATA%\conch\config.toml
#
# Conch uses an Alacritty-compatible TOML format with additional [conch.*] sections.

# ---------------------------------------------------------------------------
# Window
# ---------------------------------------------------------------------------

[window]

# Window decoration style.
# Values: "Full", "Transparent", "Buttonless", "None" (case-insensitive)
#
#   Full        — Standard title bar and borders (default)
#   Transparent — Transparent title bar, content extends behind it (macOS only)
#   Buttonless  — No title bar or buttons, terminal fills the entire window (macOS only)
#   None        — No title bar or borders
#
decorations = "Full"

[window.dimensions]

# Initial window size in character cells. 0 = use system default.
columns = 150
lines = 50

# ---------------------------------------------------------------------------
# Font
# ---------------------------------------------------------------------------

[font]

# Terminal font size in points.
size = 14.0

[font.normal]

# Terminal font family name.
family = "JetBrains Mono"

[font.offset]

# Extra pixel spacing added to each character cell.
# x = horizontal pixels per cell, y = vertical pixels per cell.
x = 0.0
y = 0.0

# ---------------------------------------------------------------------------
# Colors
# ---------------------------------------------------------------------------

[colors]

# Color scheme name. Themes are loaded from ~/.config/conch/themes/<name>.toml.
# Built-in fallback: dracula.
theme = "dracula"

# UI appearance mode: "dark", "light", or "system".
# Controls the native title bar and egui widget styling.
appearance_mode = "dark"

# ---------------------------------------------------------------------------
# Terminal
# ---------------------------------------------------------------------------

# Scroll sensitivity multiplier (0.0–1.0). Lower = slower scrolling.
# Default 0.15, tuned for macOS trackpads. Increase for external mice.
scroll_sensitivity = 0.15

[terminal.shell]

# Shell program to run. Empty string = use default login shell ($SHELL).
program = ""

# Arguments passed to the shell program.
args = []

[terminal.env]

# Extra environment variables set in the terminal.
# TERM and COLORTERM are always set to "xterm-256color" and "truecolor"
# unless overridden here.
#
# Example:
#   EDITOR = "nvim"
#   LANG = "en_US.UTF-8"

[terminal.cursor.style]

# Cursor shape: "Block", "Underline", or "Beam".
shape = "Block"

# Whether the cursor blinks.
# Accepts: true, false, "Always", "On", "Never", "Off"
blinking = true

# Vi mode cursor style (shown when vi mode is active in supported shells).
# Uncomment to override. Same options as [terminal.cursor.style] above.
# [terminal.cursor.vi_mode_style]
# shape = "Block"
# blinking = false

# ---------------------------------------------------------------------------
# Conch — Keyboard Shortcuts
# ---------------------------------------------------------------------------
#
# Format: "mod+key" where mod is cmd, ctrl, alt, shift (combine with +).
# On Linux/Windows, "cmd" maps to Ctrl.

[conch.keyboard]

new_tab = "cmd+t"
close_tab = "cmd+w"
new_window = "cmd+shift+n"
quit = "cmd+q"
zen_mode = "cmd+shift+z"
toggle_left_panel = "cmd+shift+e"
toggle_right_panel = "cmd+shift+r"
toggle_bottom_panel = "cmd+shift+j"

# ---------------------------------------------------------------------------
# Conch — UI Settings
# ---------------------------------------------------------------------------

[conch.ui]

# UI font family (sidebars, menus, dialogs). Empty string = system default.
font_family = ""

# UI font size in points.
font_size = 13.0

# Use the native macOS global menu bar instead of the in-window menu bar.
# Only applies on macOS; ignored on other platforms. Default: true.
native_menu_bar = true

# ---------------------------------------------------------------------------
# Conch — Plugin System
# ---------------------------------------------------------------------------
#
# Control which plugin types are loaded. Disabling plugins you don't use
# reduces startup time and resource usage (e.g. java = false avoids
# starting a JVM entirely).
#
# Set enabled = false to disable the entire plugin engine for a lean
# terminal with no plugin overhead.

[conch.plugins]

# Master switch: false disables all plugin discovery, loading, and the
# plugin bus. The app runs as a pure terminal emulator.
# Default: true
enabled = true

# Per-type toggles (only relevant when enabled = true).
# All default to true. Set to false to disable a specific type.
native = true     # Native shared-library plugins (.dylib / .so / .dll)
lua = true        # Lua script plugins (.lua)
java = true       # Java JAR plugins (.jar) — disabling skips JVM startup

# Extra directories to scan for plugins. The app always checks built-in
# paths (~/.config/conch/plugins/, exe directory, etc.). Paths here are
# appended to those defaults.
# search_paths = ["~/my-conch-plugins"]
