<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Settings — Conch</title>
  <link rel="stylesheet" href="styles/base.css" />
  <link rel="stylesheet" href="styles/panels.css" />
  <link rel="stylesheet" href="styles/plugin-widgets.css" />
  <link rel="stylesheet" href="styles/dialogs.css" />
  <link rel="stylesheet" href="styles/settings-window.css" />
  <link rel="stylesheet" href="styles/skins.css" />
</head>
<body>
  <div id="settings-titlebar">
    <div class="settings-titlebar-drag" data-tauri-drag-region>
      <span class="settings-titlebar-title" data-tauri-drag-region>Settings</span>
    </div>
    <div class="settings-titlebar-controls">
      <button class="settings-titlebar-btn settings-titlebar-btn-minimize" aria-label="Minimize">
        <svg width="10" height="1" viewBox="0 0 10 1"><rect width="10" height="1" fill="currentColor"/></svg>
      </button>
      <button class="settings-titlebar-btn settings-titlebar-btn-maximize" aria-label="Maximize">
        <svg width="10" height="10" viewBox="0 0 10 10"><rect x="0.5" y="0.5" width="9" height="9" fill="none" stroke="currentColor" stroke-width="1"/></svg>
      </button>
      <button class="settings-titlebar-btn settings-titlebar-btn-close" aria-label="Close">
        <svg width="10" height="10" viewBox="0 0 10 10">
          <line x1="0" y1="0" x2="10" y2="10" stroke="currentColor" stroke-width="1.2"/>
          <line x1="10" y1="0" x2="0" y2="10" stroke="currentColor" stroke-width="1.2"/>
        </svg>
      </button>
    </div>
  </div>
  <div id="settings-root"></div>

  <script src="app/core/utils.js"></script>
  <script src="app/core/tauri-client.js"></script>
  <script src="app/core/keyboard-router.js"></script>
  <script src="app/core/dialog-service.js"></script>
  <script src="app/core/config-service.js"></script>
  <script src="app/ui/toast.js"></script>
  <script src="app/panels/plugin-widgets.js"></script>
  <script src="app/features/settings/constants.js"></script>
  <script src="app/features/settings/data-service.js"></script>
  <script src="app/features/settings/search.js"></script>
  <script src="app/features/settings/sidebar.js"></script>
  <script src="app/features/settings/sections-appearance.js"></script>
  <script src="app/features/settings/sections-basic.js"></script>
  <script src="app/features/settings/sections-keyboard.js"></script>
  <script src="app/features/settings/sections-terminal.js"></script>
  <script src="app/features/settings/plugins-section.js"></script>
  <script src="app/panels/settings.js"></script>
  <script type="module">
    const tauriClient = window.conchTauriClient && typeof window.conchTauriClient.create === 'function'
      ? window.conchTauriClient.create({ tauri: window.__TAURI__ })
      : null;
    if (!tauriClient) {
      throw new Error('Tauri client is unavailable in settings window');
    }
    const invoke = tauriClient.invoke;
    const listen = tauriClient.listenOnCurrentWindow;
    const configService = window.conchConfigService || {};

    if (window.pluginWidgets && typeof window.pluginWidgets.init === 'function') {
      window.pluginWidgets.init({
        invoke,
        listen,
      });
    }

    // Apply theme colors.
    try {
      const tc = await invoke('GET_THEME_COLORS');
      if (typeof configService.applyThemeCss === 'function') {
        configService.applyThemeCss(tc);
      }
    } catch (e) {
      console.warn('Failed to load theme colors:', e);
    }

    // Apply UI font sizes from config.
    try {
      const appCfg = await invoke('GET_APP_CONFIG');
      if (typeof configService.applyUiConfig === 'function') {
        configService.applyUiConfig(appCfg);
      } else {
        document.documentElement.classList.toggle('no-animations', appCfg.disable_animations === true);
      }
    } catch (_) {}

    // Activate custom titlebar on Windows/Linux (no native decorations).
    try {
      const appCfg = await invoke('GET_APP_CONFIG');
      if (appCfg.platform === 'windows' || appCfg.platform === 'linux') {
        const titlebar = document.getElementById('settings-titlebar');
        titlebar.classList.add('visible');

        const win = window.__TAURI__.window.getCurrentWindow();
        titlebar.querySelector('.settings-titlebar-btn-minimize').addEventListener('click', () => win.minimize());
        titlebar.querySelector('.settings-titlebar-btn-maximize').addEventListener('click', async () => {
          if (await win.isMaximized()) { win.unmaximize(); } else { win.maximize(); }
        });
        titlebar.querySelector('.settings-titlebar-btn-close').addEventListener('click', () => win.close());
      }
    } catch (_) {}

    // Initialize settings in standalone window mode.
    if (window.settings) {
      window.settings.init({ invoke, listen });
      window.settings.openInWindow(document.getElementById('settings-root'));
    }
  </script>
</body>
</html>
